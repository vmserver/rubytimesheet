name: Database Backup

on:
  schedule:
    - cron: '0 0,12 * * *' # Twice a day at midnight and noon UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backup_db.js

      - name: Push backup to Private Repo
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO_FULL_NAME: ${{ secrets.BACKUP_REPO_FULL_NAME }}
        run: |
          # 1. Setup backup-repo directory
          # We try to clone first. If it's a blank repo, clone will fail, so we create a new dir and init.
          if git clone https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO_FULL_NAME}.git backup-repo; then
            echo "✅ Successfully cloned existing repository."
          else
            echo "⚠️ Clone failed. Repository might be blank. Initializing from scratch..."
            mkdir -p backup-repo
            cd backup-repo
            git init
            git remote add origin https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO_FULL_NAME}.git
            git checkout -b main
            cd ..
          fi
          
          # 2. Copy the backup file
          cp backup_full.json backup-repo/backup_full.json
          
          # 3. Commit and Push
          cd backup-repo
          git config user.name "GitHub Actions Backup"
          git config user.email "actions@github.com"
          git add backup_full.json
          
          # Only commit if there are changes
          if git status --porcelain | grep -q .; then
            git commit -m "Automated backup: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            # Push -u origin main to set up upstream if it's the first time
            git push -u origin main
          else
            echo "No changes to backup_full.json"
          fi

